  { name = "MigrateAllCommentsToo-MACTX.md" },
  { name = "NeverRecoverAlwaysFail-NRAFX.md" },
  { name = "NoGlobalStateAnywhere-NGSAX.md" },
  { name = "FailFastFailLoud-FFFLX.md" },
  { name = "SameHelperCallsNoExceptions-SHCNEX.md" },
  { name = "NoChangesWithoutScalaReference-NCWSRX.md" },
  { name = "ImmediateInterningDiscipline-IIDX.md" },
  { name = "CloserToScalaNotFurther-CSTNFX.md" },
