   { name = "NoChangesWithoutScalaReference-NCWSRX.md" },
   { name = "ImmediateInterningDiscipline-IIDX.md" },
   { name = "CloserToScalaNotFurther-CSTNFX.md" },
   { name = "NoNovelCodeDuringMigrations-NNCDMX.md" },
