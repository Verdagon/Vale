name: CI

on:
  push:
    branches: [master, stable, repair-vale]
  pull_request:
    branches: [master, stable, repair-vale]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test_ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 16
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-16 llvm-16-dev clang-16 libpolly-16-dev cmake build-essential
          echo "LLVM_CONFIG=/usr/bin/llvm-config-16" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build
        run: cargo build --manifest-path FrontendRust/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path FrontendRust/Cargo.toml

  build_and_test_mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 16
        run: |
          brew install llvm@16 cmake
          echo "LLVM_CONFIG=$(brew --prefix llvm@16)/bin/llvm-config" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build
        run: cargo build --manifest-path FrontendRust/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path FrontendRust/Cargo.toml

  build_and_test_docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t valec --file scripts/docker/Dockerfile .

      - name: Smoke test (valec --version)
        run: docker run --rm valec --version
