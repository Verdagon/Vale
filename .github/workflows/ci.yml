name: CI

on:
  push:
    branches: [master, stable, repair-vale]
  pull_request:
    branches: [master, stable, repair-vale]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test_ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 16
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-16 llvm-16-dev clang-16 libpolly-16-dev cmake build-essential zlib1g-dev libzstd-dev libcurl4-openssl-dev
          echo "LLVM_CONFIG=/usr/bin/llvm-config-16" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build
        run: cargo build --manifest-path FrontendRust/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path FrontendRust/Cargo.toml

      - name: Package release artifact
        run: |
          mkdir -p release/Vale-Ubuntu
          cp FrontendRust/target/debug/valec release/Vale-Ubuntu/
          cp scripts/all/README release/Vale-Ubuntu/
          cp -r Backend/builtins release/Vale-Ubuntu/builtins
          cp -r stdlib release/Vale-Ubuntu/stdlib
          (cd release && zip -r Vale-Ubuntu-0.zip Vale-Ubuntu)

      - uses: actions/upload-artifact@v4
        with:
          name: Vale-Ubuntu-0
          path: release/Vale-Ubuntu-0.zip

  build_and_test_mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 16
        run: |
          brew install llvm@16 cmake
          echo "LLVM_CONFIG=$(brew --prefix llvm@16)/bin/llvm-config" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build
        run: cargo build --manifest-path FrontendRust/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path FrontendRust/Cargo.toml

      - name: Package release artifact
        run: |
          mkdir -p release/Vale-Mac
          cp FrontendRust/target/debug/valec release/Vale-Mac/
          cp scripts/all/README release/Vale-Mac/
          cp -r Backend/builtins release/Vale-Mac/builtins
          cp -r stdlib release/Vale-Mac/stdlib
          (cd release && zip -r Vale-Mac-0.zip Vale-Mac)

      - uses: actions/upload-artifact@v4
        with:
          name: Vale-Mac-0
          path: release/Vale-Mac-0.zip

  build_and_test_docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t valec --file scripts/docker/Dockerfile .

      - name: Smoke test (valec --version)
        run: docker run --rm valec --version

  build_and_test_wasi:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 16
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-16 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y llvm-16 llvm-16-dev clang-16 libpolly-16-dev cmake build-essential zlib1g-dev libzstd-dev libcurl4-openssl-dev
          echo "LLVM_CONFIG=/usr/bin/llvm-config-16" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasi-sdk
        run: |
          # wasi-sdk ships its own clang preconfigured with the wasi sysroot.
          # We use it (not the system clang-16 above) for the wasm link step;
          # clang-16 is still needed for FrontendRust's host-side build.
          mkdir -p $HOME/wasi-sdk
          curl -L https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-33/wasi-sdk-33.0-x86_64-linux.tar.gz \
            | tar -xz -C $HOME/wasi-sdk --strip-components=1
          echo "WASI_SDK_PATH=$HOME/wasi-sdk" >> $GITHUB_ENV

      - name: Install wasmtime
        run: |
          curl -L https://wasmtime.dev/install.sh | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Cargo build
        run: cargo build --manifest-path FrontendRust/Cargo.toml

      - name: Cargo test (end_to_end under wasi)
        env:
          VALE_TEST_BACKEND: wasi
        run: cargo test --manifest-path FrontendRust/Cargo.toml --lib end_to_end_tests -- --test-threads=4
